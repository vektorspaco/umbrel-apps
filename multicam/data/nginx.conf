server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CORS: necesario porque hls.js hace requests cross-origin
    # cuando el reproductor se sirve por un dominio y los segmentos por otro
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

    # Logs minimos
    access_log off;
    error_log /var/log/nginx/error.log warn;

    # index.html: nada de cache, queremos cambios inmediatos
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Manifests HLS: cache cortisimo
    # (.m3u8 cambian poco pero conviene no cachearlos agresivo)
    location ~ \.m3u8$ {
        add_header Cache-Control "public, max-age=10";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # Segmentos .ts: inmutables, cache agresivo
    # Cloudflare adelante va a cachearlos por 1 año
    location ~ \.ts$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # Default: range requests habilitados (vienen por default en nginx)
    location / {
        try_files $uri $uri/ =404;
    }

    # Healthcheck para Umbrel y para verificar desde LAN
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
